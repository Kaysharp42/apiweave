# Build the Electron desktop app into installable bundles per OS and upload them
# as workflow artifacts. Triggered by pushing a `desktop-v*` tag (or manually).
#
# Each job freezes the Python sidecars natively (PyInstaller can't cross-compile)
# and pins a mongod, builds the frontend, then electron-builder packages the
# per-OS installer (NSIS / AppImage+deb / dmg) bundling those as extraResources.
name: Desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-13, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Backend deps must be importable for PyInstaller to trace the app graph.
      - name: Set up backend venv
        shell: bash
        run: |
          python -m venv backend/venv
          if [ "${{ runner.os }}" = "Windows" ]; then
            PY=backend/venv/Scripts/python.exe
          else
            PY=backend/venv/bin/python
          fi
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install ./backend

      - name: Freeze sidecars + stage mongod (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build-desktop-sidecars.ps1

      - name: Freeze sidecars + stage mongod (Unix)
        if: runner.os != 'Windows'
        run: ./scripts/build-desktop-sidecars.sh

      # electron-builder shells out to fpm for the .deb/.pacman targets; pacman
      # packaging needs bsdtar (libarchive-tools) and fakeroot.
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot libarchive-tools

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Package installer (electron-builder)
        working-directory: desktop
        env:
          # No Apple signing certs in CI — build unsigned rather than fail.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: apiweave-desktop-${{ matrix.os }}
          path: |
            desktop/release/*.exe
            desktop/release/*.dmg
            desktop/release/*.AppImage
            desktop/release/*.deb
            desktop/release/*.pacman
          if-no-files-found: error
