# Build the desktop app into installable bundles per OS and attach them to a
# draft GitHub Release. Triggered by pushing a `desktop-v*` tag (or manually).
#
# Each job freezes the Python sidecars natively (PyInstaller can't cross-compile)
# and pins a mongod, then tauri-action builds the frontend + Rust and bundles the
# per-OS installer.
name: Desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

# tauri-action needs write access to create/attach the draft Release.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            triple: aarch64-apple-darwin
          - os: macos-13
            triple: x86_64-apple-darwin
          - os: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf

      # Backend deps must be importable for PyInstaller to trace the app graph.
      - name: Set up backend venv
        shell: bash
        run: |
          python -m venv backend/venv
          if [ "${{ runner.os }}" = "Windows" ]; then
            PY=backend/venv/Scripts/python.exe
          else
            PY=backend/venv/bin/python
          fi
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install ./backend

      - name: Freeze sidecars + stage mongod (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build-desktop-sidecars.ps1

      - name: Freeze sidecars + stage mongod (Unix)
        if: runner.os != 'Windows'
        run: ./scripts/build-desktop-sidecars.sh

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install desktop deps (Tauri CLI)
        working-directory: desktop
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('desktop-v0.0.0-run{0}', github.run_number) }}
          releaseName: "APIWeave Desktop ${{ github.ref_type == 'tag' && github.ref_name || github.run_number }}"
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.triple }}
