# Build the Electron desktop app into installable bundles per OS and upload them
# as workflow artifacts. Triggered by pushing a `desktop-v*` tag (or manually).
#
# Single-process Electron app — everything runs inside the Electron process.
# electron-builder packages installers directly from the TypeScript source.
name: Desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-13, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # electron-builder shells out to fpm for the .deb/.pacman targets; pacman
      # packaging needs bsdtar (libarchive-tools) and fakeroot.
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot libarchive-tools

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      # electron-builder ships dist/desktop/** but does not compile TS — bundle
      # the main process (esbuild) first or the installer has no main.js.
      - name: Bundle main process
        working-directory: desktop
        run: npm run build:electron

      - name: Package installer (electron-builder)
        working-directory: desktop
        env:
          # No Apple signing certs in CI — build unsigned rather than fail.
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: apiweave-desktop-${{ matrix.os }}
          path: |
            desktop/release/*.exe
            desktop/release/*.dmg
            desktop/release/*.AppImage
            desktop/release/*.deb
            desktop/release/*.pacman
          if-no-files-found: error

  # Attach every OS's installer to the GitHub Release for the tag, so users
  # download from the release page (not the buried per-run artifacts). One job,
  # so there's no race to create the release.
  publish:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish installers to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=$(find dist -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.pacman' \))
          echo "$files"
          [ -n "$files" ] || { echo "no installers built" >&2; exit 1; }
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "APIWeave Desktop $GITHUB_REF_NAME" \
            --notes "Automated desktop build (unsigned). Install notes: see the README 'Desktop App' section." \
            $files \
          || gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber $files
