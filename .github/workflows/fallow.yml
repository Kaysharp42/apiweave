name: Fallow analysis
on: [push, pull_request]

permissions:
  contents: read
  security-events: write

jobs:
  fallow:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Install dependencies
        run: npm install

      - name: Run fallow audit
        id: fallow-audit
        uses: fallow-rs/fallow@e36026dfc0f00bfdf8dab889efc58ab86e5ec466 # v2.104.0
        with:
          root: app
          command: audit
          format: sarif
          gate: new-only
          annotations: true
          review-comments: true
          review-guidance: true
          fail-on-issues: true

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: fallow-results.sarif
          category: fallow
        if: always() && steps.fallow-audit.outputs.sarif_file
        continue-on-error: true
