# Render smoke test for the Electron desktop shell. Builds the frontend, then
# launches the shell headless under Xvfb (no sidecars) and asserts the renderer
# loads the embedded SPA — see desktop/smoke.cjs. Catches a broken app://
# protocol handler or preload before they ship.
name: Desktop render smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - desktop/**
      - frontend/**
      - .github/workflows/desktop-smoke.yml
  push:
    branches: [main]
    paths:
      - desktop/**
      - frontend/**
      - .github/workflows/desktop-smoke.yml

jobs:
  render-smoke:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # The non-packaged shell serves frontend/dist over app://, so build it first.
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Install Xvfb + Electron runtime libs
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libnss3 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libgbm1 \
            libasound2

      - name: Launch headless and assert render
        working-directory: desktop
        run: xvfb-run -a --server-args="-screen 0 1280x800x24" node smoke.cjs
