name: Backend Quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install backend dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-asyncio pytest-cov mypy ruff
    - name: Run pytest
      run: |
        cd backend
        python -m pytest tests/ -v --tb=short
      env:
        BASE_URL: http://localhost:8000
        MONGODB_URL: mongodb://localhost:27017
        MONGODB_DB_NAME: apiweave_test
        ALLOWED_ORIGINS: http://localhost:3000
        SECRET_KEY: test-secret-key-for-ci
    - name: Run mypy
      run: |
        cd backend
        python -m mypy app
    - name: Run ruff
      run: |
        cd backend
        python -m ruff check app tests

  doc-truth-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Check for relevant file changes
        id: diff
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if echo "$CHANGED" | grep -qE '^docs/|^backend/|^frontend/src/'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run doc-truth check
        if: steps.diff.outputs.relevant == 'true'
        run: bash scripts/doc-truth-check.sh
