name: Frontend Quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run tests
        run: npm test
        working-directory: frontend
      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
