services:
  mongodb:
    image: mongo:7
    container_name: apiweave-mongodb
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: apiweave

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apiweave-backend
    ports:
      - "${BACKEND_PORT:-8210}:8000"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=apiweave
    depends_on:
      - mongodb
    volumes:
      - ./backend/app:/app/app
      - ./backend/artifacts:/app/artifacts

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apiweave-worker
    command: python -m app.worker
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=apiweave
    depends_on:
      - mongodb
      - backend
    volumes:
      - ./backend/app:/app/app
      - ./backend/artifacts:/app/artifacts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apiweave-frontend
    ports:
      - "${FRONTEND_PORT:-3210}:3000"
    env_file:
      - ./frontend/.env
    environment:
      - BACKEND_INTERNAL_URL=http://backend:8000
      - FRONTEND_ALLOWED_HOST=${FRONTEND_ALLOWED_HOST:-apiweave.kaysharp.com}
    depends_on:
      - backend

volumes:
  mongodb_data:
