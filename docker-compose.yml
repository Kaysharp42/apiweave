version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: apiweave-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: apiweave

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apiweave-backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=apiweave
      - DEBUG=true
      - MCP_ENABLED=true
      - MCP_HTTP_ENABLED=true
      - MCP_API_KEY=dev-api-key-change-in-production
      - MCP_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - MCP_REQUIRE_API_KEY=false
    depends_on:
      - mongodb
    volumes:
      - ./backend/app:/app/app
      - ./backend/artifacts:/app/artifacts

  mcp-stdio:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apiweave-mcp-stdio
    command: python mcp_stdio.py
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=apiweave
      - MCP_ENABLED=true
      - MCP_HTTP_ENABLED=false
    depends_on:
      - mongodb
      - backend
    volumes:
      - ./backend/app:/app/app
      - ./backend/artifacts:/app/artifacts
      - ./backend/mcp_stdio.py:/app/mcp_stdio.py

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apiweave-worker
    command: python -m app.worker
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DB_NAME=apiweave
    depends_on:
      - mongodb
      - backend
    volumes:
      - ./backend/app:/app/app
      - ./backend/artifacts:/app/artifacts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apiweave-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

volumes:
  mongodb_data:
