# DEV-ONLY overlay: a Stripe CLI sidecar that forwards test webhooks to the
# backend container. Production does NOT need this — Stripe delivers webhooks
# directly to your public /api/billing/webhook URL.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.stripe-dev.yml up
#
# Requires STRIPE_SECRET_KEY in backend/.env. The listener's signing secret is
# stable per account; get it once with `stripe listen --print-secret` (or
# scripts/stripe_setup.py) and set STRIPE_WEBHOOK_SECRET in backend/.env so the
# backend verifies what this sidecar forwards.
version: "3.8"

services:
  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: apiweave-stripe-cli
    env_file:
      - ./backend/.env
    command: >
      listen
      --api-key ${STRIPE_SECRET_KEY}
      --forward-to http://backend:8000/api/billing/webhook
    depends_on:
      - backend
